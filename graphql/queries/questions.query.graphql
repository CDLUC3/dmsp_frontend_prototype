query QuestionsDisplayOrder($sectionId: Int!) {
  questions(sectionId: $sectionId) {
    displayOrder
  }
}

query PlanSectionQuestions($sectionId: Int!) {
  questions(sectionId: $sectionId) {
    id
    questionText
    displayOrder
    guidanceText
    requirementText
    sampleText
    sectionId
    templateId
    isDirty
  }
}

query Question($questionId: Int!) {
  question(questionId: $questionId) {
    id
    guidanceText
    errors {
      general
      questionText
      requirementText
      sampleText
      displayOrder
      questionConditionIds
      sectionId
      templateId
    }
    displayOrder
    questionText
    json
    requirementText
    sampleText
    useSampleTextAsDefault
    sectionId
    templateId
    isDirty
    required
  }
}

query PublishedQuestions($planId: Int!, $versionedSectionId: Int!) {
  publishedQuestions(planId: $planId, versionedSectionId: $versionedSectionId) {
    id
    questionText
    guidanceText
    requirementText
    sampleText
    useSampleTextAsDefault
    required
    hasAnswer
    questionType
    versionedQuestionId
    customQuestionId
    json
  }
}

query PublishedCustomQuestions($planId: Int!, $versionedCustomSectionId: Int!) {
  publishedCustomQuestions(planId: $planId, versionedCustomSectionId: $versionedCustomSectionId) {
    id
    questionText
    guidanceText
    requirementText
    sampleText
    useSampleTextAsDefault
    required
    hasAnswer
    questionType
    versionedQuestionId
    customQuestionId
    json
  }
}


query PublishedQuestion($versionedQuestionId: Int!) {
  publishedQuestion(versionedQuestionId: $versionedQuestionId) {
    id
    guidanceText
    errors {
      general
      questionText
      requirementText
      sampleText
      displayOrder
      versionedSectionId
    }
    displayOrder
    questionText
    json
    requirementText
    sampleText
    useSampleTextAsDefault
    versionedSectionId
    versionedTemplateId
    required
    ownerAffiliation {
      acronyms
      displayName
      uri
      name
      id
    }
  }
}