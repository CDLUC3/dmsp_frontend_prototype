query Repositories($input: RepositorySearchInput!) {
  repositories(input: $input) {
    hasPreviousPage
    hasNextPage
    currentOffset
    availableSortFields
    totalCount
    nextCursor
    limit
     items {
      ... on CustomRepository {
        name
        description
        uri
        website
        repositoryTypes
        errors {
          general
          uri
        }
        keywords
        id
      }
      ... on Re3DataRepository {
        keywords
        id
        name
        description
        uri
        website
        repositoryTypes
      }
    }
  }
}

query RepositorySubjectAreas {
  repositorySubjectAreas
}

query RepositoriesByURIs($uris: [String!]!) {
  repositoriesByURIs(uris: $uris) {
    keywords
    id
    errors {
      general
      uri
    }
    name
    description
    uri
    website
    repositoryTypes
  }
}

query Re3RepositoryTypesList {
  re3RepositoryTypesList {
    totalCount
    types {
      count
      type
    }
  }
}

query Re3SubjectList {
  re3SubjectList {
    totalCount
    subjects {
      subject
      count
    }
  }
}

query Re3byURIs($uris: [String!]!) {
  re3byURIs(uris: $uris) {
    name
    id
    description
    keywords
    uri
    website
    repositoryTypes
  }
}