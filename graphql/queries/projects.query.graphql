query MyProjects($term: String, $paginationOptions: PaginationOptions) {
  myProjects(term: $term, paginationOptions: $paginationOptions) {
    totalCount
    nextCursor
    items {
      title
      id
      startDate
      endDate
      fundings {
        name
        grantId
      }
      members {
        name
        role
        orcid
      }
      errors {
        general
        title
      }
    }
  }
}

query Project($projectId: Int!) {
  project(projectId: $projectId) {
    title
    abstractText
    startDate
    endDate
    isTestProject
    fundings {
      id
      grantId
      affiliation {
        name
        displayName
        searchName
        uri
      }
      funderOpportunityNumber
      funderProjectNumber
      status
    }
    members {
      givenName
      surName
      memberRoles {
        description
        displayOrder
        label
        uri
      }
      email
      id
      affiliation {
        displayName
      }
      orcid
    }
    researchDomain {
      id
      parentResearchDomainId
    }
     plans {
      versionedSections {
        sectionType
        customSectionId
        answeredQuestions
        displayOrder
        versionedSectionId
        title
        totalQuestions
      }
      title
      templateTitle
      id
      funding
      dmpId
      registered
      modified
      created
    }
    readOnly
    collaborators {
      user {
        id
        givenName
        surName
      }
      accessLevel
      id
    }
  }
}

query ProjectFundingsApi($projectId: Int!) {
  project(projectId: $projectId) {
    fundings {
      affiliation {
        apiTarget
      }
    }
  }
}
