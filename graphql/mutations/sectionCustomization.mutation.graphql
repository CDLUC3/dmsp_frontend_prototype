mutation MoveCustomSection($input: MoveCustomSectionInput!) {
  moveCustomSection(input: $input) {
    id
    guidance
    errors {
      general
    }
    introduction
    migrationStatus
    name
    pinnedSectionId
    pinnedSectionType
    requirements
    templateCustomizationId
    modified
    modifiedById
  }
}

mutation AddSectionCustomization($input: AddSectionCustomizationInput!) {
  addSectionCustomization(input: $input) {
    id
    guidance
    versionedSection {
      id
      name
    }
    errors {
      general
      guidance
      migrationStatus
    }
    migrationStatus
    modified
    sectionId
    templateCustomizationId
  }
}

mutation UpdateSectionCustomization($input: UpdateSectionCustomizationInput!) {
  updateSectionCustomization(input: $input) {
    id
    guidance
    errors {
      guidance
      general
      migrationStatus
      sectionId
      templateCustomizationId
    }
    migrationStatus
    modified
    sectionId
    templateCustomizationId
    versionedSection {
      id
      displayOrder
      name
    }
  }
}

mutation RemoveSectionCustomization($sectionCustomizationId: Int!) {
  removeSectionCustomization(sectionCustomizationId: $sectionCustomizationId) {
    id
    guidance
    errors {
      general
      guidance
      migrationStatus
      sectionId
      templateCustomizationId
    }
    migrationStatus
    modified
    sectionId
    templateCustomizationId
    versionedSection {
      id
      displayOrder
      guidance
      errors {
        general
      }
      introduction
      modified
      name
      requirements
      section {
        id
        displayOrder
        name
      }
      versionedQuestions {
        id
        guidanceText
      }
      versionedTemplate {
        id
        description
        name
      }
    }
  }
}
