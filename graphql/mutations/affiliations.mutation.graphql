mutation AddAffiliation($input: AffiliationInput!) {
  addAffiliation(input: $input) {
    errors {
      general
      name
    }
    uri
  }
}

mutation UpdateAffiliation($input: AffiliationInput!) {
  updateAffiliation(input: $input) {
    feedbackEmails
    feedbackEnabled
    feedbackMessage
    id
    uri
    name
    displayName
    errors {
      general
      feedbackEmails
      feedbackMessage
    }
  }
}
